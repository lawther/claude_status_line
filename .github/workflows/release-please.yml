name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          archive="claude_status_line-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" -C target/${{ matrix.target }}/release claude_status_line
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "claude_status_line-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/claude_status_line.exe" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ env.ARCHIVE }} --repo "${{ github.repository }}"

  publish-release:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false --repo "${{ github.repository }}"

  bump-formula:
    needs: [release-please, publish-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Checksums
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          
          # Download assets
          curl -sL -O "https://github.com/${{ github.repository }}/releases/download/${TAG}/claude_status_line-${TAG}-aarch64-apple-darwin.tar.gz"
          curl -sL -O "https://github.com/${{ github.repository }}/releases/download/${TAG}/claude_status_line-${TAG}-x86_64-apple-darwin.tar.gz"
          
          ARM_SHA=$(sha256sum "claude_status_line-${TAG}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          INTEL_SHA=$(sha256sum "claude_status_line-${TAG}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ARM_SHA=$ARM_SHA" >> $GITHUB_ENV
          echo "INTEL_SHA=$INTEL_SHA" >> $GITHUB_ENV

      - name: Push to Homebrew Tap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Clone the tap repo
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/lawther/homebrew-tap.git" homebrew-tap
          cd homebrew-tap
          mkdir -p Formula
          
          # Create formula
          cat <<EOF > Formula/claude_status_line.rb
          class ClaudeStatusLine < Formula
            desc "Status line renderer for Claude Code"
            homepage "https://github.com/lawther/claude_status_line"
            version "${{ env.VERSION }}"

            if OS.mac?
              if Hardware::CPU.intel?
                url "https://github.com/lawther/claude_status_line/releases/download/v#{version}/claude_status_line-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ env.INTEL_SHA }}"
              elsif Hardware::CPU.arm?
                url "https://github.com/lawther/claude_status_line/releases/download/v#{version}/claude_status_line-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ env.ARM_SHA }}"
              end
            end

            def install
              bin.install "claude_status_line"
            end

            def caveats
              <<~EOS
                To register the status line in Claude Code, run:
                  claude_status_line --install --link

                Using the --link flag ensures Claude Code references the Homebrew-managed
                binary path directly, allowing 'brew upgrade' to apply updates automatically.
              EOS
            end

            test do
              system "#{bin}/claude_status_line", "--help"
            end
          end
          EOF
          
          git add Formula/claude_status_line.rb
          git commit -m "feat: bump claude_status_line to ${{ env.VERSION }}" || exit 0
          git push origin main
